{% extends "base.html" %}

{% block head %}
<!-- Include Bootstrap CSS for styling -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
{% endblock %}

{% block title %}Place Order{% endblock %}

{% block body %}
<div class="container">
    <div class="row">
        <h1 class="mt-5">Place Order</h1>
        <form method="post">
            {% csrf_token %}
            <ul>
                {% for item in cart_items  %}
                    <li>{{ item.product.product_name }} ({{ item.quantity }}) - {{ item.total_price }}</li>
                {% endfor %}
            </ul>
            <button type="submit">Confirm Order</button>
        </form>
    </div>
</div>
{% endblock %}
