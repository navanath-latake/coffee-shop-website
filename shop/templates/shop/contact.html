{% extends 'base.html' %}
{% load static %}


{% block title %}Contact{% endblock title %}

{% block body %}
<div class="container-fluid px-0">
  <img src="{% static 'contact_us.jpg' %}" alt="" class="d-block w-100" height="500">
</div>

<div class="container">
    <h1 class="text-center">Contact Us</h1>
</div>

<div class="container mb-4 px-4" style="align-items:center;">
    <form method="post" action="/contact">
        {% csrf_token %}

        <div class="mb-3">
            <label for="name" class="form-label">Full Name:</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email address:</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number:</label>
            <input type="text" class="form-control" id="phone" name="phone" placeholder="Enter your mobile number">
        </div>

        <div class="mb-3">
            <label for="desc" class="form-label">Tell me why you want to contact:</label>
            <textarea class="form-control" name="desc" id="desc" rows="3"></textarea>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock %}
