{% extends 'base.html' %}
{% load static %}

{% block title %}Contact{% endblock title %}

{% block body %}

<!-- ✅ Styled banner replacing the broken image -->
<div style="background: linear-gradient(135deg, #1a0a00 0%, #3b1f0c 60%, #6b3a2a 100%); padding: 80px 40px; text-align: center; position: relative; overflow: hidden; margin-bottom: 2rem;">
  <div style="position: absolute; top: -60px; left: -60px; width: 220px; height: 220px; border-radius: 50%; background: rgba(192,121,64,0.08);"></div>
  <div style="position: absolute; bottom: -80px; right: -40px; width: 280px; height: 280px; border-radius: 50%; background: rgba(212,160,85,0.07);"></div>
  <p style="font-size: 13px; letter-spacing: 0.18em; color: #c07940; text-transform: uppercase; margin: 0 0 12px; font-family: sans-serif;">Navanath's Coffee Shop</p>
  <h1 style="font-size: 2.8rem; font-weight: 500; color: #f5ead8; margin: 0 0 16px; font-family: Georgia, serif;">Get In Touch</h1>
  <p style="font-size: 1rem; color: rgba(245,234,216,0.6); margin: 0; font-family: sans-serif; max-width: 420px; display: inline-block; line-height: 1.7;">We'd love to hear from you. Drop us a message and we'll get back to you over a warm cup.</p>
</div>

<div class="container mb-4 px-4">
    <form method="post" action="{% url 'contact' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label">Full Name:</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email address:</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label for="phone" class="form-label">Phone Number:</label>
            <input type="text" class="form-control" id="phone" name="phone" placeholder="Enter your mobile number">
        </div>
        <div class="mb-3">
            <label for="desc" class="form-label">Tell me why you want to contact:</label>
            <textarea class="form-control" name="desc" id="desc" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>

{% endblock %}
