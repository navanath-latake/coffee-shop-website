<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Navanath's Coffee Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --espresso: #1a0a00;
      --roast:    #3b1f0c;
      --mocha:    #6b3a2a;
      --caramel:  #c07940;
      --cream:    #f5ead8;
      --foam:     #fdf6ec;
      --accent:   #d4a055;
      --muted:    #7a5c48;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--espresso);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(192,121,64,.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(107,58,42,.12) 0%, transparent 55%);
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
      padding: 24px 16px;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown .5s ease;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .brand .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--roast), var(--mocha));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.8rem;
      color: var(--accent);
      border: 2px solid rgba(212,160,85,.3);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .brand p {
      color: rgba(245,234,216,.5);
      font-size: .85rem;
      font-style: italic;
    }

    /* Card */
    .login-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(212,160,85,.15);
      border-radius: 18px;
      padding: 36px 38px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
      animation: fadeUp .55s ease .1s both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .login-card h4 {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 1.25rem;
      margin-bottom: 4px;
    }

    .login-card .sub {
      color: rgba(245,234,216,.45);
      font-size: .82rem;
      margin-bottom: 28px;
    }

    .form-label {
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--caramel);
      margin-bottom: 6px;
    }

    .form-control {
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(212,160,85,.2);
      border-radius: 9px;
      padding: 11px 14px;
      font-size: .92rem;
      color: var(--cream);
      transition: border-color .3s ease, box-shadow .3s ease, background .3s ease;
    }

    .form-control::placeholder { color: rgba(245,234,216,.3); }

    .form-control:focus {
      background: rgba(255,255,255,.1);
      border-color: var(--caramel);
      box-shadow: 0 0 0 3px rgba(192,121,64,.2);
      outline: none;
      color: var(--cream);
    }

    .input-group-text {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(212,160,85,.2);
      border-right: none;
      color: var(--caramel);
      border-radius: 9px 0 0 9px;
    }

    .input-group .form-control { border-left: none; border-radius: 0 9px 9px 0; }

    .btn-login {
      width: 100%;
      background: var(--caramel);
      color: var(--espresso);
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      padding: 13px;
      letter-spacing: .04em;
      margin-top: 24px;
      transition: background .3s ease, transform .3s ease, box-shadow .3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-login:hover {
      background: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(192,121,64,.3);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: rgba(245,234,216,.2);
      font-size: .78rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,160,85,.15);
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
    }

    .footer-links a {
      color: var(--caramel);
      font-size: .85rem;
      font-weight: 600;
      text-decoration: none;
      transition: color .3s ease;
    }

    .footer-links a:hover { color: var(--accent); }

    .back-home {
      text-align: center;
      margin-top: 24px;
    }

    .back-home a {
      color: rgba(245,234,216,.4);
      font-size: .82rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color .3s ease;
    }

    .back-home a:hover { color: var(--caramel); }
  </style>
</head>
<body>

  <div class="login-wrap">

    <!-- Brand -->
    <div class="brand">
      <div class="logo-icon"><i class="fas fa-mug-hot"></i></div>
      <h1>Navanath's Coffee</h1>
      <p>Sign in to continue your coffee journey</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <h4>Welcome Back</h4>
      <p class="sub">Enter your credentials to access your account</p>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" name="username" placeholder="Your username" autocomplete="username">
          </div>
        </div>

        <div class="mb-1">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" name="password" placeholder="Your password" autocomplete="current-password">
          </div>
        </div>

        <div style="text-align:right;margin-top:8px;">
          <a href="#" style="font-size:.8rem;color:rgba(192,121,64,.7);text-decoration:none;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <div class="footer-links">
        Don't have an account? <a href="#">Register here</a>
      </div>
    </div>

    <div class="back-home">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
